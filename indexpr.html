<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width", initial-scale=1.0">
	<title>Formulario Completo</title>
</head>
<body>
	<img src="ipec.jpg">
	<h1>Ipec de Santo Domingo</h1>
	<h3>Formulario de Prematricula</h3>
	<form action="#" method="post">
		<fieldset>
			<legend>Informacion Personal</legend>
			<label for="nombre">Nombre:</label><br>
			<input type="text" id="nombre" name="nombre"><br>

			<label for="sexo">Sexo:</label><br>
			<select id="sexo" name="sexo">

				<option value="masculino">Masculino</option>
				<option value="femenino">Femenino</option>


			<label for="apellido">Apellidos:</label><br>
			<input type="text" id="apellido" name="cedula"><br>

			<label for="cedula">Numero de Identificacion</label><br>
			<input type="text" id="cedula" name="cedula"><br><br>

			<label for="fecha">Fecha de Nacimiento:</label><br>
			<input type="date" id="fecha" name="fecha"><br><br>
			
			<label for="correo">Correo electronico:</label><br>
			<input type="email" id="correo" name="correo"><br><br>

			<label for="telefono">Numero telefonico:</label><br>
			<input type="tel" id="telefono" name="telefono"><br><br>

			<label for="direccion">Direccion exacta:</label><br>
			<textarea type="direccion" id="direccion" rows="4" 			cols="50"></textarea><br><br>
		</fieldset>
		<br>
		<fieldset>
			<legend>Información Academica y de interés</legend>

			<label for="nivel">Último nivel educativo aprobado:</label><br>
			<select id="nivel" name="nivel">

				<option value="">Seleccione una opcion</option>
				<option value="primaria">Primaria</option>
				<option value="noveno">noveno año</option>
				<option value="secundaria">bachillerato</option>
				<option value="universidad">Universidad</option>
				<option value="tecnico">Tecnico</option>
			</select><br><br>

<label for="ultimo">Nombre del último centro educativo donde estudió:</label><br>
<input type="text" id="institucion" name=institucion"><br><br>

			<label for="carrera">Carrera Tecnica:</label><br>
			<select id="carrera" name="carrera">

				<option value="">Seleccione una opcion</option>
				<option value="desarrollo">Desarrollo web</option>
				<option value="contabilidad">Contabilidad</option>
				<option value="ejecutivo">Ejecutivo comercial</option>
				<option value="salud">Salud ocupacional</option>
				<option value="administracion">Administracion</option>

</select><br><br>

		<label for="ho">Horario:</label><br>
		<select id="ho" name="ho">
			<option value="Diurno">Diurno</option>
			<option value="Nocturno">Nocturno</option>



</fieldset>
<br>
<fieldset>
<legend>Información de encargado legal</legend>

<label for="nombre">Nombre Completo del encargado:</label><br>
<input type="text" id="nombre" name="nombre"><br>

<label for="cedula">Cédula del encargado:</label><br>
<input type="text" id="cedula" name="cedula"><br>

<label for="telefono">Teléfono del encargado:</label><br>
<input type="text" id="telefono" name="telefono"><br>

</fieldset>


<fieldset>
	<legend>Informacion Medica</legend>
	<label>¿Posee alguna enfermedad?</label><br>

	<input type="radio" id="si" name="enfermedad" value="si">
	<label for="si">SI</label><br>

	<input type="radio" id="no" name="enfermedad" value="si">
	<label for="no">NO</label><br><br>

	<label for="tipo_sangre">Tipo de sangre:</label><br>
	<select id="tipo_sangre" name="tipo sangre">
	<option value="">Seleccione</option>
<option value="A+">A+</option>
<option value="A-">A-</option>
<option value="B+">B+</option>
<option value="B-">"B-</option>
<option value="AB+">AB+</option>
<option value="AB-">AB-</option>
<option value="O+">O+</option>
<option value="O-">A+</option
</select><br><br>
</fieldset>
<br>

<fieldset>
	<legend>Preferencias Personales</legend>


<label for="Archivo">Subir fotografia:</label><br>
<input type="file" id="archivo" name="archivo"><br><br>

		</fieldset>
</html>
